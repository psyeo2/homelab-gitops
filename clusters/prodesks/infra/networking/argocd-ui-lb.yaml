apiVersion: v1
kind: Service
metadata:
  name: argocd-ui-lb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
    metallb.io/loadBalancerIPs: 192.168.1.50
    metallb.io/allow-shared-ip: ui-vip
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      protocol: TCP
      port: 8080
      targetPort: 8080
