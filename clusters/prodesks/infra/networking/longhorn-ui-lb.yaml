apiVersion: v1
kind: Service
metadata:
  name: longhorn-ui-lb
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "50"
    metallb.io/loadBalancerIPs: 192.168.1.50
    metallb.io/allow-shared-ip: ui-vip
spec:
  type: LoadBalancer
  selector:
    app: longhorn-ui
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 80
