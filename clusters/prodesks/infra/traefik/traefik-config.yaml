apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      ipFamilyPolicy: SingleStack
      ipFamilies:
        - IPv4
      annotations:
        metallb.io/loadBalancerIPs: 192.168.1.50
        metallb.io/allow-shared-ip: ui-vip
