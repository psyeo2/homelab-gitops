apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prodesks-traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "45"
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 38.0.2
    helm:
      releaseName: traefik
      values: |
        ingressClass:
          enabled: true
          isDefaultClass: false
          name: prodesks-traefik
        ingressRoute:
          dashboard:
            enabled: false
        providers:
          kubernetesCRD:
            enabled: true
            ingressClass: prodesks-traefik
          kubernetesIngress:
            enabled: true
            ingressClass: prodesks-traefik
            publishedService:
              enabled: true
        service:
          annotations:
            metallb.io/loadBalancerIPs: 192.168.1.50
            metallb.io/allow-shared-ip: ui-vip
          spec:
            type: LoadBalancer
  destination:
    name: in-cluster
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
