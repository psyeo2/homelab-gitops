apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage
  namespace: apps
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`homepage.home.arpa`)
      services:
        - kind: Service
          name: homepage
          port: 3001
  tls: {}
