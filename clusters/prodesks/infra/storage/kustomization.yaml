apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - longhorn.yaml
  - longhorn-storage-class.yaml
patches:
  - path: patch-local-path.yaml
    target:
      kind: StorageClass
      name: local-path
  - path: patch-longhorn-default.yaml
    target:
      kind: StorageClass
      name: longhorn
