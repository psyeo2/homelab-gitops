apiVersion: apps/v1
kind: Deployment
metadata:
  name: clankassist-piper-api
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clankassist-piper-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clankassist-piper-api
    spec:
      containers:
        - name: piper-api
          image: 192.168.1.57/homelab/piper-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
