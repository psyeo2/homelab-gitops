apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prodesks-cloudflare-ddns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: default
  source:
    repoURL: git@github.com:psyeo2/homelab-gitops.git
    targetRevision: main
    path: clusters/prodesks/apps/services/cloudflare-ddns
  destination:
    name: in-cluster
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
