apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prodesks-arr-qbittorrent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 4.4.0
    helm:
      releaseName: arr-qbittorrent
      values: |
        controllers:
          main:
            type: deployment
            strategy: Recreate
            containers:
              main:
                image:
                  repository: lscr.io/linuxserver/qbittorrent
                  tag: 5.1.2
                env:
                  TZ: Europe/London
                  PUID: 1000
                  PGID: 1000
                  WEBUI_PORT: 8080
                  TORRENTING_PORT: 6881
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
              prowlarr:
                image:
                  repository: lscr.io/linuxserver/prowlarr
                  tag: latest
                env:
                  TZ: Europe/London
                  PUID: 1000
                  PGID: 1000
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: false
              gluetun:
                image:
                  repository: qmcgaw/gluetun
                  tag: v3.40.0
                env:
                  TZ: Europe/London
                  VPN_SERVICE_PROVIDER: mullvad
                  VPN_TYPE: wireguard
                  FIREWALL: "on"
                  FIREWALL_VPN_INPUT_PORTS: 6881
                  SERVER_CITIES: Amsterdam
                  HEALTH_VPN_DURATION_INITIAL: 120s
                  WIREGUARD_PRIVATE_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: arr
                        key: WIREGUARD_MULLVAD_KEY
                  WIREGUARD_ADDRESSES: 10.74.129.145/32
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    add:
                      - NET_ADMIN
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
        service:
          main:
            controller: main
            type: LoadBalancer
            annotations:
              metallb.io/loadBalancerIPs: 192.168.1.55
            ports:
              webui:
                port: 8080
                targetPort: 8080
              bittorrent-tcp:
                enabled: true
                port: 6881
                targetPort: 6881
                protocol: TCP
              bittorrent-udp:
                enabled: true
                port: 6881
                targetPort: 6881
                protocol: UDP
              prowlarr:
                enabled: true
                port: 9696
                targetPort: 9696
                protocol: TCP
        persistence:
          config:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: qbittorrent-config
            globalMounts:
              - path: /config
          media:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: jellyfin-media
            globalMounts:
              - path: /data
          prowlarr-config:
            enabled: true
            type: persistentVolumeClaim
            existingClaim: prowlarr-config
            advancedMounts:
              main:
                prowlarr:
                  - path: /config
          tun:
            enabled: true
            type: hostPath
            hostPath: /dev/net/tun
            hostPathType: CharDevice
            advancedMounts:
              main:
                gluetun:
                  - path: /dev/net/tun
  destination:
    name: in-cluster
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
