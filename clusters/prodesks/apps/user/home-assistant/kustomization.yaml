apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - home-assistant.yaml
configMapGenerator:
  - name: home-assistant-configuration
    files:
      - configuration.yaml=configuration.yaml
generatorOptions:
  disableNameSuffixHash: true
patches:
  - target:
      kind: ConfigMap
      name: home-assistant-configuration
    patch: |-
      - op: add
        path: /metadata/namespace
        value: apps
