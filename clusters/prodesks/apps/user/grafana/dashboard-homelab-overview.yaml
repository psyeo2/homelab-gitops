          "targets": [
            {
              "editorMode": "code",
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes{job=~\".*node-exporter.*\"} / node_memory_MemTotal_bytes{job=~\".*node-exporter.*\"})) * on (instance) group_left (nodename) max by (instance, nodename) (node_uname_info{job=~\".*node-exporter.*\"})",
              "legendFormat": "{{nodename}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Memory Usage",
