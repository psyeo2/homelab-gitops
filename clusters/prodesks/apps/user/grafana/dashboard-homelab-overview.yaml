              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "100 * (1 - (node_filesystem_avail_bytes{job=~\".*node-exporter.*\", mountpoint=\"/\", fstype!=\"\"} / node_filesystem_size_bytes{job=~\".*node-exporter.*\", mountpoint=\"/\", fstype!=\"\"})) * on (instance) group_left (nodename) max by (instance, nodename) (node_uname_info{job=~\".*node-exporter.*\"})",
              "legendFormat": "{{nodename}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Root Filesystem Usage",
          "type": "timeseries"
        },
        {
          "datasource": null,
