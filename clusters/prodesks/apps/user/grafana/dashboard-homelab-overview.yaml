            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum by (instance) (rate(node_network_receive_bytes_total{job=~\".*node-exporter.*\", device!~\"lo|veth.*|cali.*|flannel.*|cni.*|docker.*|tun.*|tailscale.*|wg.*\"}[$__rate_interval])) * on (instance) group_left (nodename) max by (instance, nodename) (node_uname_info{job=~\".*node-exporter.*\"})",
              "legendFormat": "{{nodename}}",
              "range": true,
              "refId": "A"
