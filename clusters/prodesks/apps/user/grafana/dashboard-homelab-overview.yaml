            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "node_load15{job=~\".*node-exporter.*\"} * on (instance) group_left (nodename) max by (instance, nodename) (node_uname_info{job=~\".*node-exporter.*\"})",
              "instant": true,
              "legendFormat": "{{nodename}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Node Load (15m)",
          "type": "bargauge"
        },
        {
          "datasource": null,
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "id": 3,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{job=~\".*node-exporter.*\", mode=\"idle\"}[$__rate_interval]))) * on (instance) group_left (nodename) max by (instance, nodename) (node_uname_info{job=~\".*node-exporter.*\"})",
              "legendFormat": "{{nodename}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": null,
