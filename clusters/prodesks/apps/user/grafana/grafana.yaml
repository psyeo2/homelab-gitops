apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prodesks-grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.10.1
    helm:
      skipCrds: false
      releaseName: grafana
      values: |
        crds:
          enabled: false
        alertmanager:
          enabled: false
        grafana:
          defaultDashboardsTimezone: browser
          service:
            type: LoadBalancer
            port: 3000
            annotations:
              metallb.io/loadBalancerIPs: 192.168.1.50
              metallb.io/allow-shared-ip: ui-vip
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL
          persistence:
            enabled: true
            type: pvc
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            size: 10Gi
        kubeControllerManager:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        kubeScheduler:
          enabled: false
        prometheus:
          service:
            type: ClusterIP
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 50Gi
            additionalScrapeConfigs:
              - job_name: ubuntu-vm-gpu
                scrape_interval: 30s
                metrics_path: /metrics
                static_configs:
                  - targets:
                      - 192.168.1.161:9400
                    labels:
                      node: ubuntu-vm-gpu
  destination:
    name: in-cluster
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
