apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prodesks-grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.4.0
    helm:
      releaseName: grafana
      values: |
        fullnameOverride: grafana

        persistence:
          enabled: true
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          size: 5Gi

        service:
          type: LoadBalancer
          port: 3000
          targetPort: 3000
          annotations:
            metallb.io/loadBalancerIPs: 192.168.1.50
            metallb.io/allow-shared-ip: ui-vip

        grafana.ini:
          dashboards:
            default_home_dashboard_path: /var/lib/grafana/dashboards/infrastructure/homelab-home.json

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://monitoring-prometheus.monitoring.svc.cluster.local:9090
                isDefault: true
                editable: true

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: infrastructure
                orgId: 1
                folder: Infrastructure
                type: file
                disableDeletion: true
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/infrastructure

        dashboards:
          infrastructure:
            node-exporter-full:
              gnetId: 1860
              revision: 37
              datasource: Prometheus
            gpu-dcgm-12239:
              gnetId: 12239
              revision: 1
              datasource: Prometheus
            cluster-15757:
              gnetId: 15757
              revision: 1
              datasource: Prometheus
            longhorn-16888:
              gnetId: 16888
              revision: 1
              datasource: Prometheus
            homelab-home:
              json: |
                {
                  "annotations": {
                    "list": [
                      {
                        "builtIn": 1,
                        "datasource": {
                          "type": "grafana",
                          "uid": "-- Grafana --"
                        },
                        "enable": true,
                        "hide": true,
                        "iconColor": "rgba(0, 211, 255, 1)",
                        "name": "Annotations & Alerts",
                        "type": "dashboard"
                      }
                    ]
                  },
                  "editable": true,
                  "fiscalYearStartMonth": 0,
                  "graphTooltip": 0,
                  "links": [],
                  "panels": [
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "thresholds"
                          },
                          "thresholds": {
                            "mode": "absolute",
                            "steps": [
                              {
                                "color": "green",
                                "value": null
                              },
                              {
                                "color": "orange",
                                "value": 70
                              },
                              {
                                "color": "red",
                                "value": 85
                              }
                            ]
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 0,
                        "y": 0
                      },
                      "id": 1,
                      "options": {
                        "colorMode": "value",
                        "graphMode": "none",
                        "justifyMode": "center",
                        "orientation": "auto",
                        "reduceOptions": {
                          "calcs": [
                            "lastNotNull"
                          ],
                          "fields": "",
                          "values": false
                        },
                        "textMode": "auto"
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "100 - (avg(rate(node_cpu_seconds_total{job=\"external-node-exporter\",instance=\"192.168.1.20:9100\",mode=\"idle\"}[5m])) * 100)",
                          "refId": "A"
                        }
                      ],
                      "title": "Diakonos CPU",
                      "type": "stat"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "thresholds"
                          },
                          "thresholds": {
                            "mode": "absolute",
                            "steps": [
                              {
                                "color": "green",
                                "value": null
                              },
                              {
                                "color": "orange",
                                "value": 75
                              },
                              {
                                "color": "red",
                                "value": 90
                              }
                            ]
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 6,
                        "y": 0
                      },
                      "id": 2,
                      "options": {
                        "colorMode": "value",
                        "graphMode": "none",
                        "justifyMode": "center",
                        "orientation": "auto",
                        "reduceOptions": {
                          "calcs": [
                            "lastNotNull"
                          ],
                          "fields": "",
                          "values": false
                        },
                        "textMode": "auto"
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "((node_memory_MemTotal_bytes{job=\"external-node-exporter\",instance=\"192.168.1.20:9100\"} - node_memory_MemAvailable_bytes{job=\"external-node-exporter\",instance=\"192.168.1.20:9100\"}) / node_memory_MemTotal_bytes{job=\"external-node-exporter\",instance=\"192.168.1.20:9100\"}) * 100",
                          "refId": "A"
                        }
                      ],
                      "title": "Diakonos RAM",
                      "type": "stat"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "thresholds"
                          },
                          "thresholds": {
                            "mode": "absolute",
                            "steps": [
                              {
                                "color": "green",
                                "value": null
                              },
                              {
                                "color": "orange",
                                "value": 65
                              },
                              {
                                "color": "red",
                                "value": 90
                              }
                            ]
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 12,
                        "y": 0
                      },
                      "id": 3,
                      "options": {
                        "colorMode": "value",
                        "graphMode": "none",
                        "justifyMode": "center",
                        "orientation": "auto",
                        "reduceOptions": {
                          "calcs": [
                            "lastNotNull"
                          ],
                          "fields": "",
                          "values": false
                        },
                        "textMode": "auto"
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "avg(DCGM_FI_DEV_GPU_UTIL{job=\"external-dcgm-exporter\",instance=\"192.168.1.161:9400\"})",
                          "refId": "A"
                        }
                      ],
                      "title": "Ubuntu VM GPU Util",
                      "type": "stat"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "thresholds"
                          },
                          "thresholds": {
                            "mode": "absolute",
                            "steps": [
                              {
                                "color": "red",
                                "value": null
                              },
                              {
                                "color": "green",
                                "value": 1
                              }
                            ]
                          },
                          "unit": "none"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 18,
                        "y": 0
                      },
                      "id": 4,
                      "options": {
                        "colorMode": "value",
                        "graphMode": "none",
                        "justifyMode": "center",
                        "orientation": "auto",
                        "reduceOptions": {
                          "calcs": [
                            "lastNotNull"
                          ],
                          "fields": "",
                          "values": false
                        },
                        "textMode": "auto"
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "count(kube_pod_info)",
                          "refId": "A"
                        }
                      ],
                      "title": "Cluster Pod Count",
                      "type": "stat"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 0,
                        "y": 5
                      },
                      "id": 5,
                      "options": {
                        "legend": {
                          "displayMode": "list",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{job=\"node\",mode=\"idle\"}[5m])) * 100)",
                          "legendFormat": "{{instance}}",
                          "refId": "A"
                        }
                      ],
                      "title": "ProDesk CPU Load (4 Nodes)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 12,
                        "y": 5
                      },
                      "id": 6,
                      "options": {
                        "legend": {
                          "displayMode": "list",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "((node_memory_MemTotal_bytes{job=\"node\"} - node_memory_MemAvailable_bytes{job=\"node\"}) / node_memory_MemTotal_bytes{job=\"node\"}) * 100",
                          "legendFormat": "{{instance}}",
                          "refId": "A"
                        }
                      ],
                      "title": "ProDesk RAM (4 Nodes)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 0,
                        "y": 13
                      },
                      "id": 7,
                      "options": {
                        "legend": {
                          "displayMode": "list",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "100 * (1 - (node_filesystem_avail_bytes{job=~\"node|external-node-exporter\",fstype!~\"tmpfs|squashfs|overlay|ramfs\",mountpoint=\"/\"} / node_filesystem_size_bytes{job=~\"node|external-node-exporter\",fstype!~\"tmpfs|squashfs|overlay|ramfs\",mountpoint=\"/\"}))",
                          "legendFormat": "{{instance}} /",
                          "refId": "A"
                        }
                      ],
                      "title": "Disk Usage Everywhere (Root)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          },
                          "unit": "Bps"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 12,
                        "y": 13
                      },
                      "id": 8,
                      "options": {
                        "legend": {
                          "displayMode": "table",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "sum(rate(node_network_receive_bytes_total{job=~\"node|external-node-exporter\",device!~\"lo|veth.*|cni.*|flannel.*\"}[5m]))",
                          "legendFormat": "RX Total",
                          "refId": "A"
                        },
                        {
                          "editorMode": "code",
                          "expr": "sum(rate(node_network_transmit_bytes_total{job=~\"node|external-node-exporter\",device!~\"lo|veth.*|cni.*|flannel.*\"}[5m]))",
                          "legendFormat": "TX Total",
                          "refId": "B"
                        }
                      ],
                      "title": "Network Overview",
                      "type": "timeseries"
                    }
                  ],
                  "refresh": "30s",
                  "schemaVersion": 39,
                  "tags": [
                    "home",
                    "homelab",
                    "network",
                    "gpu"
                  ],
                  "templating": {
                    "list": []
                  },
                  "time": {
                    "from": "now-12h",
                    "to": "now"
                  },
                  "timezone": "",
                  "title": "Homelab Home",
                  "uid": "homelab-home",
                  "version": 1,
                  "weekStart": ""
                }
  destination:
    name: in-cluster
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
