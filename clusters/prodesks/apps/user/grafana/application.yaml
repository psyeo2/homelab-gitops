                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 0,
                        "y": 5
                      },
                      "id": 5,
                      "options": {
                        "legend": {
                          "displayMode": "list",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "editorMode": "code",
                          "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{job=\"node\",mode=\"idle\"}[5m])) * 100)",
                          "legendFormat": "{{instance}}",
                          "refId": "A"
                        }
                      ],
                      "title": "ProDesk CPU Load (4 Nodes)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": {
                        "type": "prometheus",
                        "uid": "Prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          },
                          "unit": "percent"
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 12,
                        "y": 5
