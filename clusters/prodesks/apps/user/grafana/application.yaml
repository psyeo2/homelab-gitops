apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prodesks-grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.4.0
    helm:
      releaseName: grafana
      values: |
        fullnameOverride: grafana

        persistence:
          enabled: true
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          size: 5Gi

        service:
          type: LoadBalancer
          port: 3000
          targetPort: 3000
          annotations:
            metallb.io/loadBalancerIPs: 192.168.1.50
            metallb.io/allow-shared-ip: ui-vip

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://monitoring-prometheus.monitoring.svc.cluster.local:9090
                isDefault: true
                editable: true

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: infrastructure
                orgId: 1
                folder: Infrastructure
                type: file
                disableDeletion: true
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/infrastructure

        dashboards:
          infrastructure:
            node-exporter-full:
              gnetId: 1860
              revision: 37
              datasource: Prometheus
  destination:
    name: in-cluster
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
