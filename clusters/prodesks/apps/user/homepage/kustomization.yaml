apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: homepage-config
    namespace: apps
    files:
      - config/settings.yaml
      - config/bookmarks.yaml
      - config/widgets.yaml
      - config/docker.yaml
      - config/custom.css
      - config/custom.js
      - config/kubernetes.yaml
      - config/proxmox.yaml
      - config/services.yaml
resources:
  - homepage.yaml
